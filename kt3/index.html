<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список книг</title>
    <style>
        body { font-family: system-ui, Arial, sans-serif; margin: 24px; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
        label { display: grid; gap: 6px; }
        input { padding: 10px 12px; min-width: 220px; }
        button { padding: 10px 14px; cursor: pointer; }
        .meta { margin: 16px 0; color: #444; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; background: #fff; }
        .card-title { font-weight: 700; }
        .card-hint { color: #666; font-size: 12px; margin-top: 6px; }
        .error { color: #b00020; margin-top: 10px; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="row">
        <label>
            Название
            <input type="text" id="titleInput">
        </label>
        <label>
            Автор
            <input type="text" id="authorInput">
        </label>
        <button id="addBtn">Добавить</button>
    </div>
    <div id="error" class="error"></div>
    <div class="meta">Всего книг: <span id="counter">0</span></div>
    <div id="cards" class="grid"></div>
    <script src="./dist/main.js"></script>
</body>
</html>
